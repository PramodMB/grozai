name: Deploy GrozAI Landing Page

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: GrozAI-LandingPage/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: GrozAI-LandingPage

      - name: Build
        run: npm run build
        working-directory: GrozAI-LandingPage

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: GrozAI-LandingPage/dist
